<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings</title>

<link rel="stylesheet" href="settings.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="container">

<!-- Sidebar -->

<div class="sidebar">

<div class="logo">
<i class="fa-solid fa-graduation-cap"></i>
<h2>CRAP</h2>
<p>College Result Analysis Portal</p>
</div>

<ul>

<li onclick="window.location.href='dashboard.html'">
<i class="fa-solid fa-house"></i> Dashboard
</li>

<li onclick="window.location.href='upload.html'">
<i class="fa-solid fa-upload"></i> Upload Result
</li>

<li onclick="window.location.href='search-result.html'">
<i class="fa-solid fa-magnifying-glass"></i> Search Result
</li>

<li onclick="window.location.href='subject.html'">
<i class="fa-solid fa-chart-column"></i> Subject Analysis
</li>

<li onclick="window.location.href='kt.html'">
<i class="fa-solid fa-circle-exclamation"></i> KT Analysis
</li>

<li onclick="window.location.href='topper.html'">
<i class="fa-solid fa-trophy"></i> Topper List
</li>

<li onclick="window.location.href='reports.html'">
<i class="fa-solid fa-file-lines"></i> Reports
</li>

<li class="active">
<i class="fa-solid fa-gear"></i> Settings
</li>

<li onclick="window.location.href='index.html'">
<i class="fa-solid fa-right-from-bracket"></i> Logout
</li>

</ul>

</div>

<!-- Main -->

<div class="main">

<h1>Settings</h1>

<div class="settings-box">

<label>Admin Name</label>
<input type="text" placeholder="Enter Admin Name">

<label>Email</label>
<input type="email" placeholder="Enter Email">

<label>Change Password</label>
<input type="password" placeholder="New Password">

<label>Theme</label>

<select>
<option>Light</option>
<option>Dark</option>
</select>

<button onclick="saveSettings()">
Save Settings
</button>

</div>

</div>

</div>

<script src="settings.js"></script>

</body>
</html>
